services:
  # Backend API (Producción)
  api:
    image: ghcr.io/is-product-team/iter-ecosystem-enginy/api:latest
    container_name: iter_api
    restart: always
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - ./uploads:/app/uploads
    networks:
      - red_proxy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"] # La API no tiene basePath /iter internamente, solo el proxy
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend Web (Producción)
  web:
    image: ghcr.io/is-product-team/iter-ecosystem-enginy/web:latest
    container_name: iter_web
    restart: always
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
    networks:
      - red_proxy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/iter"] # Next.js tiene basePath: /iter
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  red_proxy:
    external: true
