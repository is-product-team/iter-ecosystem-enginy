services:
  # Backend API (Producción)
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner-api
    container_name: iter_api
    restart: always
    env_file:
      - apps/api/.env.production
    environment:
      - NODE_ENV=production
      - PORT=3000
    networks:
      - red_proxy

  # Frontend Web (Producción)
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner-web
      args:
        - NEXT_PUBLIC_API_URL=https://projects.kore29.com/iter/api
    container_name: iter_web
    restart: always
    env_file:
      - apps/web/.env.production
    environment:
      - NODE_ENV=production
      - PORT=3000
    networks:
      - red_proxy

networks:
  red_proxy:
    external: true
