services:
  # Backend API (Producción)
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner-api
    container_name: iter_api
    restart: always
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - ./uploads:/app/uploads
    networks:
      - red_proxy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/iter/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend Web (Producción)
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner-web
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://projects.kore29.com/iter/api}
    container_name: iter_web
    restart: always
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
    networks:
      - red_proxy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  red_proxy:
    external: true
