name: Deploy (Self-Hosted)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      - name: 📦 Install dependencies
        run: npm install
      - name: ✅ Run Quality Gates (Lint, Type-check, Test)
        run: npm run verify

  deploy:
    needs: verify
    runs-on: [self-hosted, Linux, X64]
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔍 Diagnostics & Cleanup (Space)
        run: |
          echo "--- Disk Space Before ---"
          df -h

          echo "--- Aggressive Docker Cleanup ---"
          # Limpia contenedores parados, redes no usadas e imágenes sin tag
          docker system prune -f
          # Limpia la caché de construcción de más de 24h para liberar espacio crítico
          docker builder prune -af --filter "until=24h"

          echo "--- Disk Space After ---"
          df -h

      - name: 🐳 Mirror Base Image (GCR)
        run: |
          echo "Pulling from Google Mirror to bypass Docker Hub timeout..."
          docker pull mirror.gcr.io/library/node:22-alpine
          docker tag mirror.gcr.io/library/node:22-alpine node:22-alpine

      - name: 🔑 Create Environment Files from Secrets
        run: |
          # Crear el .env de la API
          echo "${{ secrets.PROD_API_ENV }}" > apps/api/.env.production

          # Crear el .env de la Web
          echo "${{ secrets.PROD_WEB_ENV }}" > apps/web/.env.production

          # Opcional: Crear el .env del Mobile (si lo necesitas en el servidor)
          echo "${{ secrets.PROD_MOBILE_ENV }}" > apps/mobile/.env.production

      - name: 🐳 Deploy with Docker Compose
        run: |
          # Construimos y levantamos los contenedores
          docker compose -f docker-compose.prod.yml up -d --build

          echo "⏳ Esperando 10s para estabilizar..."
          sleep 10

          echo "--- 🗄️ Ejecutando Migraciones (Prisma Push) ---"
          # Extraemos la URL y limitamos la memoria de Node para evitar el error 137 (OOM)
          export DB_URL=$(grep DATABASE_URL apps/api/.env.production | cut -d '=' -f2-)
          docker exec -e DATABASE_URL="$DB_URL" -e NODE_OPTIONS="--max-old-space-size=512" iter_api npx prisma db push --accept-data-loss

          # Limpieza final de imágenes huérfanas
          docker image prune -f
