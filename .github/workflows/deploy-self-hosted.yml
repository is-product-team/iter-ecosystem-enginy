name: Deploy (Self-Hosted)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      - name: 📦 Install dependencies
        run: npm install
      - name: ✅ Run Quality Gates (Lint, Type-check, Test)
        run: npm run verify

  deploy:
    needs: verify
    runs-on: [self-hosted, Linux, X64]
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔍 Diagnostics & Cleanup (Space)
        run: |
          echo "--- Disk Space Before ---"
          df -h

          echo "--- Aggressive Docker Cleanup ---"
          # Limpia contenedores parados, redes no usadas e imágenes sin tag
          docker system prune -f
          # Limpia la caché de construcción de más de 24h para liberar espacio crítico
          docker builder prune -af --filter "until=24h"

          echo "--- Disk Space After ---"
          df -h

      - name: 🐳 Mirror Base Image (GCR)
        run: |
          echo "Pulling from Google Mirror to bypass Docker Hub timeout..."
          docker pull mirror.gcr.io/library/node:22-alpine
          docker tag mirror.gcr.io/library/node:22-alpine node:22-alpine

      - name: 🔑 Create Environment Files from Secrets
        run: |
          # Crear el .env de la API
          echo "${{ secrets.PROD_API_ENV }}" > apps/api/.env.production

          # Crear el .env de la Web
          echo "${{ secrets.PROD_WEB_ENV }}" > apps/web/.env.production

          # Opcional: Crear el .env del Mobile (si lo necesitas en el servidor)
          echo "${{ secrets.PROD_MOBILE_ENV }}" > apps/mobile/.env.production

      - name: 🐳 Deploy with Docker Compose
        run: |
          # 1. Construir las imágenes actualizadas
          docker compose -f docker-compose.prod.yml build

          echo "--- 🗄️ Ejecutando Migraciones (Contenedor Aislado) ---"
          # Extraemos la URL para pasarla al contenedor independiente
          export DB_URL=$(grep DATABASE_URL apps/api/.env.production | cut -d '=' -f2-)
          
          # Ejecutamos la migración en un contenedor temporal que usa la red del proxy
          # Esto evita pelear por RAM con la API principal
          docker run --rm \
            --network red_proxy \
            -e DATABASE_URL="$DB_URL" \
            -e NODE_OPTIONS="--max-old-space-size=512" \
            iter-ecosystem-enginy-api \
            npx prisma db push --schema=apps/api/prisma/schema.prisma --accept-data-loss

          # 2. Levantar los servicios de producción
          docker compose -f docker-compose.prod.yml up -d
          
          echo "--- ✅ Estado de los contenedores ---"
          docker compose -f docker-compose.prod.yml ps
          
          # Limpieza final de imágenes huérfanas
          docker image prune -f
