services:
  # Base de Datos Local
  db:
    image: postgres:15-alpine
    container_name: iter_postgres
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${DB_PORT_EXTERNAL}:${DB_PORT_INTERNAL}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - iter-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 200M

  # Adminer (Visualizador DB)
  adminer:
    image: adminer
    container_name: iter_adminer
    restart: always
    ports:
      - "${ADMINER_PORT_EXTERNAL}:8080"
    networks:
      - iter-network

  # Service de Instalación y Setup
  setup:
    build:
      context: .
      dockerfile: Dockerfile
      target: base
    working_dir: /app
    volumes:
      - .:/app
      - node_modules_cache:/app/node_modules
    command: sh -c "npm install && npx prisma generate --schema=apps/api/prisma/schema.prisma && npx prisma db push --schema=apps/api/prisma/schema.prisma --accept-data-loss"
    env_file:
      - .env
    depends_on:
      - db
    networks:
      - iter-network
    deploy:
      resources:
        limits:
          memory: 500M

  # Backend API (Dev)
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: base
    working_dir: /app
    command: npm run dev --workspace=@iter/api
    volumes:
      - .:/app
      - node_modules_cache:/app/node_modules
      - ./apps/api/uploads:/app/uploads
    ports:
      - "${API_PORT_EXTERNAL}:${API_PORT_INTERNAL}"
    env_file:
      - .env
    environment:
      - PORT=${API_PORT_INTERNAL}
      - AI_MODEL_VISION=moondream
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      setup:
        condition: service_completed_successfully
    tty: true
    stdin_open: true
    networks:
      - iter-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:${API_PORT_INTERNAL}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 800M

  # Frontend Web (Dev)
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: base
    working_dir: /app
    command: npm run dev --workspace=@iter/web
    volumes:
      - .:/app
      - node_modules_cache:/app/node_modules
    ports:
      - "${WEB_PORT_EXTERNAL}:${WEB_PORT_INTERNAL}"
    env_file:
      - .env
    environment:
      - NEXT_TELEMETRY_DISABLED=1
      - PORT=${WEB_PORT_INTERNAL}
    depends_on:
      setup:
        condition: service_completed_successfully
    tty: true
    stdin_open: true
    networks:
      - iter-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:${WEB_PORT_INTERNAL}/"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2G

  # IA Local (Especializada en documentos)
  ollama:
    image: ollama/ollama:latest
    container_name: iter_ollama
    restart: always
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - iter-network
    deploy:
      resources:
        limits:
          memory: 2G

  # Setup service to pull models automatically
  ollama-setup:
    image: ollama/ollama:latest
    container_name: ollama_setup
    networks:
      - iter-network
    depends_on:
      - ollama
    environment:
      - OLLAMA_HOST=ollama:11434
    entrypoint: /bin/sh
    command: -c "sleep 15 && ollama pull gemma:2b && ollama pull moondream"
    deploy:
      resources:
        limits:
          memory: 500M

networks:
  iter-network:
    driver: bridge

volumes:
  postgres_data:
  node_modules_cache:
  ollama_data:
