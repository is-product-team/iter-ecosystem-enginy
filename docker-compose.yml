services:
  # Base de Datos Local
  db:
    image: postgres:15-alpine
    container_name: iter_postgres
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${DB_PORT_EXTERNAL}:${DB_PORT_INTERNAL}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - iter-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Adminer (Visualizador DB)
  adminer:
    image: adminer
    container_name: iter_adminer
    restart: always
    ports:
      - "${ADMINER_PORT_EXTERNAL}:8080"
    networks:
      - iter-network

  # Service de Instalación y Setup
  setup:
    build:
      context: .
      dockerfile: Dockerfile
      target: base
    working_dir: /app
    volumes:
      - .:/app
      - node_modules_cache:/app/node_modules
    command: sh -c "npm install && npx turbo db:generate --filter=api && npx prisma db push --schema=apps/api/prisma/schema.prisma --accept-data-loss && npx turbo db:seed --filter=api"
    env_file:
      - .env
    depends_on:
      - db
    networks:
      - iter-network

  # Backend API (Dev)
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: base
    working_dir: /app
    command: npx turbo dev --filter=api
    volumes:
      - .:/app
      - node_modules_cache:/app/node_modules
    ports:
      - "${API_PORT_EXTERNAL}:${API_PORT_INTERNAL}"
    env_file:
      - .env
    environment:
      - PORT=${API_PORT_INTERNAL}
    depends_on:
      setup:
        condition: service_completed_successfully
    networks:
      - iter-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:${API_PORT_INTERNAL}/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend Web (Dev)
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: base
    working_dir: /app
    command: npx turbo dev --filter=web
    volumes:
      - .:/app
      - node_modules_cache:/app/node_modules
    ports:
      - "${WEB_PORT_EXTERNAL}:${WEB_PORT_INTERNAL}"
    env_file:
      - .env
    environment:
      - NEXT_TELEMETRY_DISABLED=1
      - PORT=${WEB_PORT_INTERNAL}
    depends_on:
      setup:
        condition: service_completed_successfully
    networks:
      - iter-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:${WEB_PORT_INTERNAL}/"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  iter-network:
    driver: bridge

volumes:
  postgres_data:
  node_modules_cache: