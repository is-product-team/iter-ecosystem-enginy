services:
  # Base de Datos Local
  db:
    image: postgres:15-alpine
    container_name: iter_postgres
    restart: always
    env_file:
      - apps/api/.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-root}
      POSTGRES_DB: ${POSTGRES_DB:-iter_db}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - iter-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-iter_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 200M


  # Service de Instalación y Setup
  setup:
    build:
      context: .
      dockerfile: Dockerfile
      target: base
    working_dir: /app
    volumes:
      - .:/app
      - node_modules_cache:/app/node_modules
    command: sh -c "npm install && npx turbo db:generate --filter=api && npx prisma db push --schema=apps/api/prisma/schema.prisma --accept-data-loss && npx turbo db:seed --filter=api"
    env_file:
      - apps/api/.env
    depends_on:
      - db
    networks:
      - iter-network
    deploy:
      resources:
        limits:
          memory: 500M

  # Backend API (Dev)
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: base
    working_dir: /app
    command: npx turbo dev --filter=api
    volumes:
      - .:/app
      - node_modules_cache:/app/node_modules
    ports:
      - "${API_PORT:-3000}:${PORT:-3000}"
    env_file:
      - apps/api/.env
    depends_on:
      setup:
        condition: service_completed_successfully
    networks:
      - iter-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:${PORT:-3000}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 800M

  # Frontend Web (Dev)
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: base
    working_dir: /app
    command: npx turbo dev --filter=web
    volumes:
      - .:/app
      - node_modules_cache:/app/node_modules
    ports:
      - "${WEB_PORT:-8002}:8000"
    environment:
      - NEXT_TELEMETRY_DISABLED=1
    env_file:
      - apps/web/.env
    depends_on:
      setup:
        condition: service_completed_successfully
    networks:
      - iter-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G

  # IA Local (Especializada en documentos)
  ollama:
    image: ollama/ollama:latest
    container_name: iter_ollama
    restart: always
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - iter-network
    deploy:
      resources:
        limits:
          memory: 1.5G

networks:
  iter-network:
    driver: bridge

volumes:
  postgres_data:
  node_modules_cache:
  ollama_data:
